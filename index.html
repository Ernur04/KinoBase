<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoBase</title>

    <!-- Описание сайта -->
    <meta name="description" content="KinoBase — большая база фильмов, сериалов, аниме и мультфильмов.">

    <!-- Подключение шрифта (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Подключение иконок (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Иконка сайта (Favicon) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">

    <!-- Подключение стилей -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <!-- Логотип -->
        <div class="logo">
            <i class="fa-solid fa-clapperboard"></i>
            <span>KinoBase</span>
        </div>
        <!-- Кнопки -->
        <div class="buttons">
            <!-- Поле поиска -->
            <form id="search-form" class="search-form" action="/search" method="GET" role="search">
                <input 
                    type="search" 
                    name="q" 
                    id="search-input" 
                    placeholder="Найти фильмы, аниме, сериалы..." 
                    aria-label="Поиск по сайту" 
                    required>
                
                <button type="submit" aria-label="Начать поиск">
                    <i class="fa-solid fa-search"></i>
                </button>
            </form>
            <button type="button" class="btn" id="theme-toggle" aria-label="Сменить тему">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>


    <!-- Подвал (Footer) -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">О проекте</a>
                <a href="#">Правила</a>
                <a href="#">Контакты</a>
                <a href="#">Правообладателям</a>
            </div>
            <div class="footer-socials">
                <a href="#" aria-label="Telegram"><i class="fa-brands fa-telegram"></i></a>
                <a href="#" aria-label="VK"><i class="fa-brands fa-vk"></i></a>
                <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </div>
        <p class="footer-copyright">&copy; 2026 KinoBase. Все права защищены.</p>
    </footer>

    <!-- Подключение скрипта -->
    <script src="js/script.js"></script>
</body>

</html>
