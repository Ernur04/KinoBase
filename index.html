<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoBase</title>

    <!-- Описание сайта -->
    <meta name="description" content="KinoBase — большая база фильмов, сериалов, аниме и мультфильмов.">

    <!-- Подключение шрифта (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Подключение иконок (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Иконка сайта (Favicon) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">

    <!-- Подключение стилей -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <!-- Логотип -->
        <div class="logo">
            <i class="fa-solid fa-clapperboard"></i>
            <span>KinoBase</span>
        </div>
        <!-- Кнопки -->
        <div class="buttons">
            <button type="button" class="btn" aria-label="Сменить тему">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button type="button" class="btn" aria-label="Открыть календарь">
                <i class="fa-solid fa-calendar-days"></i>
            </button>
        </div>
    </header>
    <!-- Навигация -->
    <nav>
        <ul>
            <li><a href="#">Фильмы</a></li>
            <li><a href="#">Сериалы</a></li>
            <li><a href="#">Аниме</a></li>
            <li><a href="#">Мультфильмы</a></li>
        </ul>
    </nav>
    <!-- Главная секция -->
    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Добро пожаловать в KinoBase</h1>
                <p>Ваша персональная база фильмов и сериалов</p>
                <button type="button" class="btn btn-primary">Начать просмотр</button>
            </div>
        </section>
    </main>
    <!-- Подключение скрипта -->
    <script src="js/script.js"></script>
</body>

</html>
